# Main configuration for Hydra
# PEC-SC: Plan-Execute-Check Self-Consistency experiment

defaults:
  - _self_  # primary config sets defaults
  - run: ???  # run config overrides defaults

# Run configuration
run:
  run_id: ???  # will be set by run config

# Execution mode: full, sanity, or pilot
mode: full

# Results output directory
results_dir: .research/results

# WandB configuration
wandb:
  entity: airas
  project: 20260313-tanaka-test-v4
  mode: online

# Model API configuration
model:
  provider: openai  # or anthropic
  name: gpt-3.5-turbo
  temperature: 0.7
  max_tokens: 512

# [VALIDATOR FIX - Attempt 1]
# [PROBLEM]: ConfigAttributeError: Key 'shuffle_seed' is not in struct (dataset.shuffle_seed)
# [CAUSE]: Run-specific config defined shuffle_seed but base config.yaml didn't have it. OmegaConf struct mode prevents adding new keys not in parent.
# [FIX]: Added shuffle_seed to base dataset config
#
# [OLD CODE]:
# dataset:
#   name: gsm8k
#   split: test
#   n_samples: 200  # subsample for manageable runtime
#
# [NEW CODE]:
# Dataset configuration
dataset:
  name: gsm8k
  split: test
  n_samples: 200  # subsample for manageable runtime
  shuffle_seed: 42  # seed for shuffling dataset samples
  
# Common inference parameters
inference:
  k_samples: 6  # number of samples per question
  m_audit_checks: 3  # number of audit checks in PEC-SC
  seed: 42
  alpha: 0.4  # weight for answer agreement
  beta: 0.3  # weight for plan coverage
